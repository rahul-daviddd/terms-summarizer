<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>T&C Summary</title>
    <style>
        :root {
            --bg: #f8f5f0;
            --ink: #1f1f1f;
            --muted: #6b6b6b;
            --accent: #0f766e;
            --card: #ffffff;
            --border: #e6e1d8;
        }
        body {
            margin: 0;
            padding: 16px;
            background: var(--bg);
            color: var(--ink);
            font-family: "Segoe UI", "Helvetica Neue", Arial, sans-serif;
            width: 320px;
        }
        h2 {
            margin: 0 0 10px 0;
            font-size: 16px;
            letter-spacing: 0.3px;
        }
        button {
            width: 100%;
            background: var(--accent);
            color: white;
            border: none;
            padding: 10px 12px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: background-color 0.2s, transform 0.1s;
        }
        button:hover {
            background-color: #0d655e;
        }
        button:active {
            background-color: #0a524c;
            transform: scale(0.98);
        }
        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 8px 12px;
            margin-top: 10px;
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            gap: 12px;
        }
        .label {
            color: var(--muted);
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            margin-bottom: 0;
            flex-shrink: 0;
            width: 70px;
        }
        .card-content {
            flex: 1;
            font-size: 13px;
            line-height: 1.4;
            white-space: pre-wrap;
            text-align: left;
            color: var(--ink);
        }
        #risk {
            font-weight: 700;
        }
        .spinner {
            display: inline-block;
            width: 14px;
            height: 14px;
            border: 2px solid rgba(15, 118, 110, 0.2);
            border-radius: 50%;
            border-top-color: var(--accent);
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .loading-overlay {
            display: none;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 10px;
            color: var(--accent);
            font-weight: 500;
            font-size: 13px;
        }
    </style>
</head>
<body>

    <h2>Terms & Conditions Summary</h2>

    <button id="summarize">Analyze</button>

    <div id="loading" class="loading-overlay">
        <div class="spinner"></div>
        <span>Analyzing...</span>
    </div>

    <div class="card">
        <div class="label">Summary</div>
        <div id="summary" class="card-content">—</div>
    </div>

    <div class="card">
        <div class="label">Warnings</div>
        <div id="warnings" class="card-content">—</div>
    </div>

    <div class="card">
        <div class="label">Risk</div>
        <div id="risk" class="card-content">—</div>
    </div>

    <script src="popup.js"></script>

</body>
</html>
